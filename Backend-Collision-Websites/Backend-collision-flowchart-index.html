<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Backend Collision Flowchart</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:linear-gradient(135deg,#0f172a,#1e293b);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px;
      color:white;
    }

    .container{
      width:100%;
      max-width:1100px;
      text-align:center;
    }

    h1{
      font-size:42px;
      margin-bottom:50px;
    }

    .box{
      width:320px;
      margin:20px auto;
      padding:22px;
      border-radius:20px;
      font-size:20px;
      font-weight:bold;
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
      transition:0.3s;
    }

    .box:hover{
      transform:scale(1.05);
    }

    .blue{
      background:#3b82f6;
    }

    .green{
      background:#22c55e;
    }

    .yellow{
      background:#facc15;
      color:black;
    }

    .red{
      background:#ef4444;
    }

    .purple{
      background:#9333ea;
    }

    .arrow{
      font-size:40px;
      margin:10px 0;
    }

    .split{
      display:flex;
      justify-content:center;
      gap:60px;
      flex-wrap:wrap;
      margin-top:20px;
    }

    .section{
      display:flex;
      flex-direction:column;
      align-items:center;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>Backend Collision Management Flowchart</h1>

  <div class="box blue">
    User Request
  </div>

  <div class="arrow">⬇</div>

  <div class="box green">
    Authentication & Validation
  </div>

  <div class="arrow">⬇</div>

  <div class="box yellow">
    Check Collision / Data Overlap
  </div>

  <div class="split">

    <div class="section">
      <div class="arrow">YES ⬇</div>

      <div class="box red">
        Apply Database Lock
      </div>

      <div class="arrow">⬇</div>

      <div class="box red">
        Prevent Duplicate Entry
      </div>
    </div>

    <div class="section">
      <div class="arrow">NO ⬇</div>

      <div class="box green">
        Allow Transaction
      </div>

      <div class="arrow">⬇</div>

      <div class="box green">
        Update Database
      </div>
    </div>

  </div>

  <div class="arrow">⬇</div>

  <div class="box purple">
    Synchronize Backend Data
  </div>

  <div class="arrow">⬇</div>

  <div class="box blue">
    Generate Logs & Alerts
  </div>

</div>

</body>
</html>
